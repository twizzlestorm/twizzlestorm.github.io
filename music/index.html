<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv='cache-control' content='no-cache'> 
	<meta http-equiv='expires' content='0'> 
	<meta http-equiv='pragma' content='no-cache'>
    <title>/music</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <style>
    body {color: white; font-family: "Helvetica"; text-align: center;}
    .small {line-height: 0.5;}
    a:link {color: darkgray;}
    a:visited {color: darkgray;}
    a:link.announce {color: #ffffbf;}
    a:visited.announce {color: #ffffbf;}
    .centeredasf {position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);}
    .css-selector { background: linear-gradient(324deg, #005d45, #620063); background-size: 400% 400%; -webkit-animation: thereal 10s ease infinite; -moz-animation: thereal 10s ease infinite; animation: thereal 10s ease infinite; } }
    @-webkit-keyframes thereal { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @-moz-keyframes thereal { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes thereal { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    body { animation: thereal 20s infinite; }
  </style>
  
  <body>
    <div class="centeredasf">
      <div class="small">
        <h1>music</h1>
        <h3><a class="announce" href="https://twzzl.fanlink.to/infused">check out my new album!</a></h3>
      </div>
      <p><a href="https://twzzl.bandcamp.com">bandcamp</a> | <a href="https://open.spotify.com/artist/0xJdgzL2KFVO1ttkx9wotB?si=RxZFZpyTQXe82pxYIle9UQ">spotify</a></p>
