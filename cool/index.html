<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="refresh" content="3; URL=https://ethan.is"/>
		<style>
			.centeredasf {position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);}
			body {background-color: black;}
			.fade-in {animation: fadeIn ease 3s; -webkit-animation: fadeIn ease 3s; -moz-animation: fadeIn ease 3s; -o-animation: fadeIn ease 3s; -ms-animation: fadeIn ease 3s;}
			@keyframes fadeIn {0%,99% {opacity:0;} 25%,75% {opacity:1;}}
			@-moz-keyframes fadeIn {0%,99% {opacity:0;} 25%,75% {opacity:1;}}
			@-webkit-keyframes fadeIn {0%,99% {opacity:0;} 25%,75% {opacity:1;}}
			@-o-keyframes fadeIn {0%,99% {opacity:0;} 25%,75% {opacity:1;}}
			@-ms-keyframes fadeIn {0%,99% {opacity:0;} 25%,75% {opacity:1;}}
		</style>
	</head>
	
	<body>
		<div class="centeredasf fade-in">
			<img src="cool.png" alt="cool emoji">
		</div>
	</body>
</html>
